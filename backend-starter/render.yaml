# render.yaml — IronLog FastAPI backend on Render
# Place this file in the ROOT of the ironlog-api repo (the backend-starter/ contents).
# Render reads this to auto-configure your service.

services:
  - type: web
    name: ironlog-api
    runtime: python
    # Render runs these from the repo root
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    # healthCheckPath is called every 30s; returns {"status":"ok"}
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard (contains password)
      - key: JWT_SECRET
        sync: false        # Set manually in Render dashboard
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRES_MIN
        value: "10080"
      - key: CORS_ORIGINS
        sync: false        # Set manually — your Vercel frontend URL
      - key: ENV
        value: production
    # Free tier: 512 MB RAM, sleeps after 15 min inactivity
    # Upgrade to Starter ($7/mo) for always-on
